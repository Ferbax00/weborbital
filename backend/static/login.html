<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBITALDATA — Acceso administración</title>
    <style>
        :root { --cyan: #0891b2; --dark: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--dark), #164e63);
            padding: 1rem;
        }
        .card {
            background: #fff; border-radius: 16px; padding: 2.5rem;
            width: 100%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.25);
        }
        h1 { font-size: 1.25rem; color: var(--dark); margin-bottom: 0.25rem; }
        p { color: #64748b; font-size: 0.9rem; margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.35rem; color: #334155; }
        input[type="password"] {
            width: 100%; padding: 0.75rem 1rem; border: 1px solid #e2e8f0;
            border-radius: 8px; font-size: 1rem; margin-bottom: 1rem;
        }
        input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(8,145,178,0.15); }
        button {
            width: 100%; background: var(--cyan); color: #fff; border: none;
            padding: 0.85rem; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer;
        }
        button:hover { background: #0e7490; }
        .error { color: #b91c1c; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
        .error.show { display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h1>ORBITALDATA</h1>
        <p>Ingrese la contraseña para acceder al panel, documentación API y solicitudes.</p>
        <p id="error" class="error">Contraseña incorrecta. Intente de nuevo.</p>
        <form method="post" action="/admin/login">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required autofocus autocomplete="current-password" />
            <button type="submit">Entrar</button>
        </form>
    </div>
    <script>
        if (new URLSearchParams(location.search).get('error') === '1') {
            document.getElementById('error').classList.add('show');
        }
    </script>
</body>
</html>
